<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>~/xander</title>
        <meta name="description" content="Xander Emili — Platform Engineer" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/site.webmanifest" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --bg: #181824;
                --node-bg: #1f2430;
                --node-border: #343e4c;
                --node-header-bg: #242b38;
                --text: #d9d7ce;
                --muted: #5c6773;
                --accent: #73d0ff;
                --warm: #ffcc66;
                --green: #bae67e;
                --purple: #d4bfff;
                --orange: #ff8f40;
                --mono: "JetBrains Mono", monospace;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: var(--bg);
                font-family: var(--mono);
            }

            #canvas-root {
                position: relative;
                width: 100%;
                height: 100%;
                overflow: hidden;
                cursor: default;
            }

            #grid-canvas {
                position: absolute;
                inset: 0;
                pointer-events: none;
            }

            #world {
                position: absolute;
                top: 0;
                left: 0;
                width: 0;
                height: 0;
                transform-origin: 0 0;
            }

            /* ── Nodes ──────────────────────────────────────────────── */

            .node {
                position: absolute;
                width: 290px;
                background: var(--node-bg);
                border: 1px solid var(--node-border);
                border-radius: 6px;
                color: var(--text);
                font-size: 12.5px;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
                will-change: transform;
                transition: border-color 0.15s;
            }

            .node:hover {
                border-color: #4a5568;
            }

            .node-header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                background: var(--node-header-bg);
                border-radius: 6px 6px 0 0;
                border-bottom: 1px solid var(--node-border);
                cursor: grab;
                user-select: none;
            }

            .node.closed .node-header {
                border-bottom: none;
                border-radius: 6px;
            }

            .node-header:active {
                cursor: grabbing;
            }

            .node-pip {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--accent);
                flex-shrink: 0;
                opacity: 0.7;
            }

            .node-title {
                flex: 1;
                font-size: 12px;
                font-weight: 500;
                color: var(--accent);
                letter-spacing: 0.02em;
            }

            .node-btn {
                background: none;
                border: none;
                color: var(--muted);
                cursor: pointer;
                font: 15px/1 var(--mono);
                width: 20px;
                height: 20px;
                display: grid;
                place-items: center;
                border-radius: 3px;
                transition:
                    color 0.1s,
                    background 0.1s;
            }

            .node-btn:hover {
                color: var(--text);
                background: rgba(255, 255, 255, 0.07);
            }

            .node-body {
                overflow: hidden;
                max-height: 800px;
                transition: max-height 0.2s ease;
            }

            .node.closed .node-body {
                max-height: 0;
            }

            .node-body-inner {
                padding: 13px 14px;
                line-height: 1.75;
            }

            .node-body a {
                color: var(--warm);
                text-decoration: none;
            }

            .node-body a:hover {
                text-decoration: underline;
            }

            .node-body p {
                margin-bottom: 8px;
            }

            .node-body p:last-child {
                margin-bottom: 0;
            }

            .node-body .dim {
                color: var(--muted);
                font-size: 11.5px;
            }

            .more-btn {
                background: none;
                border: none;
                color: var(--warm);
                cursor: pointer;
                font-family: var(--mono);
                font-size: inherit;
                padding: 0;
            }

            .more-btn:hover {
                text-decoration: underline;
            }

            .more-content {
                overflow: hidden;
                max-height: 0;
                transition: max-height 0.2s ease;
            }

            .more-content.open {
                max-height: 200px;
            }

            .node-body ul {
                list-style: none;
            }

            .node-body ul li {
                padding: 3px 0;
            }

            .node-body ul li::before {
                content: "→  ";
                color: var(--muted);
            }

            .tag {
                display: inline-block;
                padding: 1px 7px;
                background: rgba(115, 208, 255, 0.07);
                border: 1px solid rgba(115, 208, 255, 0.16);
                border-radius: 3px;
                font-size: 11px;
                color: var(--accent);
                margin: 2px 2px 2px 0;
            }

            .tag.g {
                background: rgba(186, 230, 126, 0.07);
                border-color: rgba(186, 230, 126, 0.16);
                color: var(--green);
            }

            .kv {
                display: flex;
                gap: 8px;
                padding: 3px 0;
                font-size: 12px;
            }

            .kv .k {
                color: var(--accent);
                min-width: 72px;
                flex-shrink: 0;
            }

            .kv .v {
                color: var(--text);
            }

            /* ── Draw node ──────────────────────────────────────────── */

            .draw-toolbar {
                display: flex;
                align-items: center;
                gap: 5px;
                padding-bottom: 10px;
                margin-bottom: 10px;
                border-bottom: 1px solid var(--node-border);
            }

            .color-swatch {
                width: 14px;
                height: 14px;
                border-radius: 50%;
                border: 2px solid transparent;
                cursor: pointer;
                flex-shrink: 0;
                transition:
                    border-color 0.1s,
                    transform 0.1s;
            }

            .color-swatch.active {
                border-color: rgba(255, 255, 255, 0.65);
                transform: scale(1.25);
            }

            .color-swatch:hover:not(.active) {
                transform: scale(1.15);
            }

            .draw-sizes {
                display: flex;
                align-items: center;
                gap: 5px;
                margin-left: auto;
            }

            .size-btn {
                background: var(--muted);
                border: none;
                border-radius: 50%;
                cursor: pointer;
                display: block;
                transition:
                    background 0.1s,
                    transform 0.1s;
            }

            .size-btn.active {
                background: var(--text);
            }

            .size-btn:hover {
                transform: scale(1.2);
            }

            .draw-clear {
                background: none;
                border: 1px solid var(--node-border);
                color: var(--muted);
                font-family: var(--mono);
                font-size: 11px;
                padding: 2px 7px;
                border-radius: 3px;
                cursor: pointer;
                margin-left: 4px;
                transition:
                    color 0.1s,
                    border-color 0.1s;
            }

            .draw-clear:hover {
                color: var(--text);
                border-color: var(--muted);
            }

            .draw-canvas {
                display: block;
                border-radius: 3px;
                cursor: crosshair;
            }

            .resize-handle {
                position: absolute;
                bottom: 5px;
                right: 5px;
                width: 14px;
                height: 14px;
                cursor: nwse-resize;
                opacity: 0.3;
                transition: opacity 0.15s;
            }

            .resize-handle::after {
                content: "";
                position: absolute;
                inset: 3px 0 0 3px;
                border-right: 2px solid var(--muted);
                border-bottom: 2px solid var(--muted);
            }

            .node:hover .resize-handle {
                opacity: 0.75;
            }

            /* ── Matrix canvas ──────────────────────────────────────── */

            #matrix-canvas {
                position: absolute;
                inset: 0;
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.6s ease;
            }

            #matrix-canvas.visible {
                opacity: 1;
            }

            /* ── Hint / toggle ──────────────────────────────────────── */

            #hint {
                position: fixed;
                bottom: 18px;
                left: 18px;
                font-family: var(--mono);
                font-size: 11px;
                color: var(--muted);
                pointer-events: none;
                line-height: 2;
            }

            #matrix-toggle {
                position: fixed;
                bottom: 18px;
                right: 18px;
                background: none;
                border: 1px solid var(--node-border);
                color: var(--muted);
                font-family: var(--mono);
                font-size: 11px;
                padding: 6px 10px;
                border-radius: 4px;
                cursor: pointer;
                transition:
                    color 0.15s,
                    border-color 0.15s;
            }

            #matrix-toggle:hover {
                color: var(--accent);
                border-color: var(--accent);
            }

            #matrix-toggle.active {
                color: var(--accent);
                border-color: var(--accent);
            }
        </style>
    </head>
    <body>
        <div id="canvas-root">
            <canvas id="matrix-canvas"></canvas>
            <canvas id="grid-canvas"></canvas>
            <div id="world"></div>
        </div>
        <div id="hint">drag canvas · pan<br />scroll · zoom</div>
        <button id="matrix-toggle">[ rain ]</button>

        <script>
            // ── Node data ─────────────────────────────────────────────────────
            const NODES = [
                {
                    id: "intro",
                    title: "xander",
                    x: 0,
                    y: 0,
                    open: true,
                    html: `
            <p class="dim" style="margin-bottom:10px">alexander emili</p>
            <p>investment analyst who decided building apps was more fun</p>
            <p style="margin-top:10px">platform engineer &nbsp;·&nbsp; <button class="more-btn">more →</button></p>
            <div class="more-content">
              <div style="margin-top:12px;border-top:1px solid var(--node-border);padding-top:10px">
                <div class="kv"><span class="k">company</span><span class="v">Sandbox Banking</span></div>
                <div class="kv"><span class="k">role</span><span class="v">Platform Engineer</span></div>
                <div class="kv"><span class="k">duration</span><span class="v">2022 – 2025</span></div>
                <p class="dim" style="margin-top:8px">Led development of ETL platform serving 100+ enterprise customers.</p>
              </div>
            </div>
          `,
                },
                {
                    id: "links",
                    title: "links",
                    x: 320,
                    y: 0,
                    open: true,
                    html: `
            <ul>
              <li><a href="https://github.com/xanemili" target="_blank" rel="noopener">github</a></li>
              <li><a href="https://www.linkedin.com/in/xemili/" target="_blank" rel="noopener">linkedin</a></li>
              <li><a href="mailto:xanemili@proton.me">email</a></li>
              <li><a href="https://docs.google.com/document/d/1Rhp8Dc7Sojj04ggcIBTq4g19-Teqp6l8qZQij0kNk94/edit?tab=t.0">resume</a></li>
            </ul>
          `,
                },
                {
                    id: "projects",
                    title: "projects",
                    x: 320,
                    y: 195,
                    open: false,
                    html: `
            <p style="margin-bottom:10px">
              <a href="https://slaythespirestats.xanxan.me" target="_blank" rel="noopener">
                Slay the Spire Run Statistics
              </a>
            </p>
            <div>
              <span class="tag">React</span>
              <span class="tag">TypeScript</span>
              <span class="tag">Cloudflare</span>
              <span class="tag">SQLite</span>
            </div>
          `,
                },
                {
                    id: "skills",
                    title: "skills",
                    x: 160,
                    y: 370,
                    open: false,
                    html: `
            <p class="dim" style="margin-bottom:8px">languages</p>
            <div style="margin-bottom:12px">
              <span class="tag">TypeScript</span>
              <span class="tag">JavaScript</span>
              <span class="tag">Python</span>
              <span class="tag">Go</span>
            </div>
            <p class="dim" style="margin-bottom:8px">frameworks</p>
            <div style="margin-bottom:12px">
              <span class="tag">Vue</span>
              <span class="tag">React</span>
              <span class="tag">Svelte</span>
              <span class="tag">FastAPI</span>
              <span class="tag">Django</span>
            </div>
            <p class="dim" style="margin-bottom:8px">infra</p>
            <div>
              <span class="tag g">Cloudflare</span>
              <span class="tag g">Docker</span>
              <span class="tag g">AWS</span>
              <span class="tag g">GitHub</span>
            </div>
          `,
                },
                {
                    id: "draw",
                    title: "draw",
                    x: 640,
                    y: 0,
                    open: true,
                    html: `
            <div class="draw-toolbar">
              <button class="color-swatch active" data-color="#d9d7ce" style="background:#d9d7ce" title="white"></button>
              <button class="color-swatch" data-color="#f28779" style="background:#f28779" title="red"></button>
              <button class="color-swatch" data-color="#ffcc66" style="background:#ffcc66" title="yellow"></button>
              <button class="color-swatch" data-color="#bae67e" style="background:#bae67e" title="green"></button>
              <button class="color-swatch" data-color="#73d0ff" style="background:#73d0ff" title="blue"></button>
              <button class="color-swatch" data-color="#d4bfff" style="background:#d4bfff" title="purple"></button>
              <div class="draw-sizes">
                <button class="size-btn active" data-size="2" style="width:6px;height:6px"></button>
                <button class="size-btn" data-size="5" style="width:10px;height:10px"></button>
                <button class="size-btn" data-size="12" style="width:16px;height:16px"></button>
              </div>
              <button class="draw-clear">clear</button>
            </div>
            <canvas class="draw-canvas" width="262" height="180"></canvas>
          `,
                },
            ];

            // ── DOM ───────────────────────────────────────────────────────────
            const root = document.getElementById("canvas-root");
            const gc = document.getElementById("grid-canvas");
            const worldEl = document.getElementById("world");
            const gctx = gc.getContext("2d");

            // ── State ─────────────────────────────────────────────────────────
            let wt = { x: 0, y: 0, s: 1 };
            let drag = null;
            let drawing = null; // active draw stroke: { canvas, ctx, color, size }
            let matrixOn = false;
            let nextZ = 10;
            const nodeMap = {};

            // ── Persistence ───────────────────────────────────────────────────
            const STORAGE_KEY = "xe-home-v1";

            function saveState() {
                const nodeStates = {};
                for (const [id, { data }] of Object.entries(nodeMap)) {
                    nodeStates[id] = { x: data.x, y: data.y, open: data.open };
                }
                const drawCanvas =
                    nodeMap["draw"]?.el.querySelector(".draw-canvas");
                const drawData = drawCanvas
                    ? {
                          w: drawCanvas.width,
                          h: drawCanvas.height,
                          img: drawCanvas.toDataURL(),
                      }
                    : null;
                try {
                    localStorage.setItem(
                        STORAGE_KEY,
                        JSON.stringify({
                            nodes: nodeStates,
                            world: { x: wt.x, y: wt.y, s: wt.s },
                            draw: drawData,
                            matrixOn,
                        }),
                    );
                } catch {
                    // quota exceeded — silently skip
                }
            }

            let saveTimer = null;
            function scheduleSave() {
                clearTimeout(saveTimer);
                saveTimer = setTimeout(saveState, 400);
            }

            function loadSaved() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    return raw ? JSON.parse(raw) : null;
                } catch {
                    return null;
                }
            }

            // ── Grid ──────────────────────────────────────────────────────────
            function resizeGrid() {
                gc.width = window.innerWidth;
                gc.height = window.innerHeight;
            }

            function drawGrid() {
                const w = gc.width,
                    h = gc.height;
                gctx.clearRect(0, 0, w, h);

                const spacing = 40 * wt.s;
                if (spacing < 6) return;

                const ox = ((wt.x % spacing) + spacing) % spacing;
                const oy = ((wt.y % spacing) + spacing) % spacing;

                gctx.strokeStyle = "rgba(255,255,255,0.04)";
                gctx.lineWidth = 1;
                gctx.beginPath();
                for (let x = ox - spacing; x < w + spacing; x += spacing) {
                    gctx.moveTo(x, 0);
                    gctx.lineTo(x, h);
                }
                for (let y = oy - spacing; y < h + spacing; y += spacing) {
                    gctx.moveTo(0, y);
                    gctx.lineTo(w, y);
                }
                gctx.stroke();
            }

            function applyTransform() {
                worldEl.style.transform = `translate(${wt.x}px,${wt.y}px) scale(${wt.s})`;
                drawGrid();
            }

            // ── Node factory ──────────────────────────────────────────────────
            function createNode(data) {
                const el = document.createElement("div");
                el.className = "node" + (data.open ? "" : " closed");
                el.innerHTML = `
          <div class="node-header">
            <div class="node-pip"></div>
            <span class="node-title">${data.title}</span>
            <button class="node-btn">${data.open ? "−" : "+"}</button>
          </div>
          <div class="node-body">
            <div class="node-body-inner">${data.html}</div>
          </div>
        `;

                placeNode(el, data.x, data.y);
                worldEl.appendChild(el);
                nodeMap[data.id] = { data, el };

                const header = el.querySelector(".node-header");
                const btn = el.querySelector(".node-btn");

                header.addEventListener("mousedown", (e) => {
                    if (e.target.closest(".node-btn")) return;
                    e.stopPropagation();
                    e.preventDefault();
                    el.style.zIndex = nextZ++;
                    drag = {
                        type: "node",
                        id: data.id,
                        sx: e.clientX,
                        sy: e.clientY,
                        ox: data.x,
                        oy: data.y,
                    };
                    document.body.style.userSelect = "none";
                });

                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    data.open = !data.open;
                    el.classList.toggle("closed", !data.open);
                    btn.textContent = data.open ? "−" : "+";
                    scheduleSave();
                });

                return el;
            }

            function placeNode(el, x, y) {
                el.style.transform = `translate(${x}px,${y}px)`;
            }

            // ── Pan ───────────────────────────────────────────────────────────
            root.addEventListener("mousedown", (e) => {
                if (!e.target.closest(".node")) {
                    drag = {
                        type: "world",
                        sx: e.clientX,
                        sy: e.clientY,
                        ox: wt.x,
                        oy: wt.y,
                    };
                    root.style.cursor = "grabbing";
                    document.body.style.userSelect = "none";
                }
            });

            window.addEventListener("mousemove", (e) => {
                if (drag) {
                    const dx = e.clientX - drag.sx;
                    const dy = e.clientY - drag.sy;

                    if (drag.type === "world") {
                        wt.x = drag.ox + dx;
                        wt.y = drag.oy + dy;
                        applyTransform();
                    } else if (drag.type === "node") {
                        const { data, el } = nodeMap[drag.id];
                        data.x = drag.ox + dx / wt.s;
                        data.y = drag.oy + dy / wt.s;
                        placeNode(el, data.x, data.y);
                    } else if (drag.type === "resize") {
                        const newW = Math.max(220, drag.ow + dx / wt.s);
                        const newH = Math.max(100, drag.oh + dy / wt.s);
                        drag.el.style.width = Math.round(newW) + "px";
                        drag.canvas.style.width = Math.round(newW - 28) + "px";
                        drag.canvas.style.height = Math.round(newH) + "px";
                    }
                }

                if (drawing) {
                    const rect = drawing.canvas.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / wt.s;
                    const y = (e.clientY - rect.top) / wt.s;
                    drawing.ctx.lineTo(x, y);
                    drawing.ctx.strokeStyle = drawing.color;
                    drawing.ctx.lineWidth = drawing.size;
                    drawing.ctx.lineCap = "round";
                    drawing.ctx.lineJoin = "round";
                    drawing.ctx.stroke();
                    drawing.ctx.beginPath();
                    drawing.ctx.moveTo(x, y);
                }
            });

            window.addEventListener("mouseup", () => {
                if (drag && drag.type === "resize") {
                    const canvas = drag.canvas;
                    const finalW =
                        Math.round(parseFloat(canvas.style.width)) ||
                        canvas.width;
                    const finalH =
                        Math.round(parseFloat(canvas.style.height)) ||
                        canvas.height;

                    // Preserve drawing content across the resize
                    const tmp = document.createElement("canvas");
                    tmp.width = canvas.width;
                    tmp.height = canvas.height;
                    tmp.getContext("2d").drawImage(canvas, 0, 0);

                    canvas.width = finalW;
                    canvas.height = finalH;
                    canvas.style.width = "";
                    canvas.style.height = "";

                    const rCtx = canvas.getContext("2d");
                    rCtx.fillStyle = "#0d1117";
                    rCtx.fillRect(0, 0, finalW, finalH);
                    rCtx.drawImage(tmp, 0, 0);
                }

                drag = null;
                drawing = null;
                root.style.cursor = "";
                document.body.style.userSelect = "";
                scheduleSave();
            });

            // ── Zoom ──────────────────────────────────────────────────────────
            root.addEventListener(
                "wheel",
                (e) => {
                    e.preventDefault();
                    const factor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
                    const ns = Math.min(Math.max(wt.s * factor, 0.15), 4);
                    const cx = e.clientX,
                        cy = e.clientY;
                    wt.x = cx + (wt.x - cx) * (ns / wt.s);
                    wt.y = cy + (wt.y - cy) * (ns / wt.s);
                    wt.s = ns;
                    applyTransform();
                    scheduleSave();
                },
                { passive: false },
            );

            window.addEventListener("resize", () => {
                resizeGrid();
                drawGrid();
                resizeMatrix();
            });

            // ── Draw node setup ───────────────────────────────────────────────
            function setupDrawNode(nodeEl) {
                const canvas = nodeEl.querySelector(".draw-canvas");
                const ctx = canvas.getContext("2d");

                let color = "#d9d7ce";
                let size = 2;

                ctx.fillStyle = "#0d1117";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                nodeEl.querySelectorAll(".color-swatch").forEach((btn) => {
                    btn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        nodeEl
                            .querySelectorAll(".color-swatch")
                            .forEach((b) => b.classList.remove("active"));
                        btn.classList.add("active");
                        color = btn.dataset.color;
                    });
                });

                nodeEl.querySelectorAll(".size-btn").forEach((btn) => {
                    btn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        nodeEl
                            .querySelectorAll(".size-btn")
                            .forEach((b) => b.classList.remove("active"));
                        btn.classList.add("active");
                        size = parseInt(btn.dataset.size);
                    });
                });

                nodeEl
                    .querySelector(".draw-clear")
                    .addEventListener("click", (e) => {
                        e.stopPropagation();
                        ctx.fillStyle = "#0d1117";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    });

                canvas.addEventListener("contextmenu", (e) =>
                    e.preventDefault(),
                );

                canvas.addEventListener("mousedown", (e) => {
                    if (e.button !== 0 && e.button !== 2) return;
                    e.stopPropagation();
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / wt.s;
                    const y = (e.clientY - rect.top) / wt.s;

                    const strokeColor = e.button === 2 ? "#0d1117" : color;
                    const strokeSize =
                        e.button === 2 ? Math.max(size * 3, 16) : size;

                    ctx.beginPath();
                    ctx.arc(x, y, strokeSize / 2, 0, Math.PI * 2);
                    ctx.fillStyle = strokeColor;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    drawing = {
                        canvas,
                        ctx,
                        color: strokeColor,
                        size: strokeSize,
                    };
                    document.body.style.userSelect = "none";
                });

                // Resize handle
                const handle = document.createElement("div");
                handle.className = "resize-handle";
                nodeEl.appendChild(handle);

                handle.addEventListener("mousedown", (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    drag = {
                        type: "resize",
                        el: nodeEl,
                        canvas,
                        sx: e.clientX,
                        sy: e.clientY,
                        ow: nodeEl.offsetWidth,
                        oh: canvas.height,
                    };
                    document.body.style.userSelect = "none";
                });
            }

            // ── Matrix rain ───────────────────────────────────────────────────
            const mCanvas = document.getElementById("matrix-canvas");
            const mCtx = mCanvas.getContext("2d");
            const MATRIX_CHARS =
                "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()_+-=[]{}|;:,.<>?/~`";
            const MATRIX_SIZE = 14;
            let matrixRaf = null;
            let matrixLastFrame = 0;
            let drops = [];

            function resizeMatrix() {
                mCanvas.width = window.innerWidth;
                mCanvas.height = window.innerHeight;
                drops = Array.from(
                    { length: Math.floor(mCanvas.width / MATRIX_SIZE) },
                    () => Math.random() * -100,
                );
            }

            function drawMatrix() {
                mCtx.fillStyle = "rgba(24,24,36,0.05)";
                mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
                mCtx.fillStyle = "#73d0ff";
                mCtx.font = `${MATRIX_SIZE}px 'JetBrains Mono', monospace`;
                for (let i = 0; i < drops.length; i++) {
                    const ch =
                        MATRIX_CHARS[
                            Math.floor(Math.random() * MATRIX_CHARS.length)
                        ];
                    mCtx.fillText(ch, i * MATRIX_SIZE, drops[i] * MATRIX_SIZE);
                    if (
                        drops[i] * MATRIX_SIZE > mCanvas.height &&
                        Math.random() > 0.975
                    ) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            function matrixFrame(ts) {
                if (!matrixOn) {
                    matrixRaf = null;
                    return;
                }
                matrixRaf = requestAnimationFrame(matrixFrame);
                if (ts - matrixLastFrame < 33) return;
                matrixLastFrame = ts;
                drawMatrix();
            }

            function setMatrix(on) {
                matrixOn = on;
                const btn = document.getElementById("matrix-toggle");
                btn.classList.toggle("active", on);
                btn.textContent = on ? "[ rain on ]" : "[ rain ]";
                mCanvas.classList.toggle("visible", on);
                if (on) {
                    if (!matrixRaf)
                        matrixRaf = requestAnimationFrame(matrixFrame);
                } else {
                    // let the fade-out finish then clear
                    setTimeout(
                        () =>
                            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height),
                        650,
                    );
                }
                scheduleSave();
            }

            document
                .getElementById("matrix-toggle")
                .addEventListener("click", () => {
                    setMatrix(!matrixOn);
                });

            // ── Init ──────────────────────────────────────────────────────────
            resizeGrid();
            resizeMatrix();

            const saved = loadSaved();

            // Overlay saved positions/open states onto defaults
            if (saved?.nodes) {
                for (const node of NODES) {
                    const s = saved.nodes[node.id];
                    if (s) {
                        node.x = s.x;
                        node.y = s.y;
                        node.open = s.open;
                    }
                }
            }

            // Restore world transform or use default centering
            if (saved?.world) {
                wt.x = saved.world.x;
                wt.y = saved.world.y;
                wt.s = saved.world.s;
            } else {
                wt.x = Math.round((window.innerWidth - 610) / 2);
                wt.y = Math.round((window.innerHeight - 430) / 2);
            }

            for (const data of NODES) {
                createNode(data);
                if (data.id === "draw") setupDrawNode(nodeMap["draw"].el);
            }

            // Wire up intro "more" button to expand experience inline
            const introEl = nodeMap["intro"].el;
            const moreBtn = introEl.querySelector(".more-btn");
            const moreContent = introEl.querySelector(".more-content");
            moreBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                const open = moreContent.classList.toggle("open");
                moreBtn.textContent = open ? "less ←" : "more →";
            });

            // Restore draw canvas content + dimensions
            if (saved?.draw) {
                const { w, h, img: dataURL } = saved.draw;
                const drawCanvas =
                    nodeMap["draw"]?.el.querySelector(".draw-canvas");
                if (drawCanvas) {
                    drawCanvas.width = w;
                    drawCanvas.height = h;
                    nodeMap["draw"].el.style.width = w + 28 + "px";
                    const img = new Image();
                    img.onload = () =>
                        drawCanvas.getContext("2d").drawImage(img, 0, 0);
                    img.src = dataURL;
                }
            }

            if (saved?.matrixOn) setMatrix(true);

            applyTransform();
        </script>
    </body>
</html>
